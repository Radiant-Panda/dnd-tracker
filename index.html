<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D Campaign Tracker</title>
  <link rel="stylesheet" href="style.css?v=82">
</head>
<body>
  <!-- Auth gate — shown when not signed in -->
  <div id="auth-gate" class="auth-gate">
    <div class="auth-card">
      <div class="auth-logo">✾</div>
      <h1 class="auth-title">D&amp;D Tracker</h1>
      <p class="auth-subtitle">GM Tools</p>
      <button class="btn btn-primary auth-google-btn" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48" style="margin-right:8px;flex-shrink:0"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 000 24c0 3.77.9 7.34 2.44 10.5l8.09-5.91z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-8.09 5.91C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      <p class="auth-footer">Your campaigns sync across devices</p>
    </div>
  </div>

  <header id="app-header" style="display:none">
    <div class="header-inner">
      <h1 class="site-title" id="site-title" onclick="showCampaigns()">✾ D&amp;D Tracker</h1>
      <nav id="breadcrumb"></nav>
      <div id="char-selector-wrap"></div>
      <div class="header-actions">
        <button class="btn btn-sm" onclick="exportData()" title="Export all data as JSON">Export</button>
        <label class="btn btn-sm" title="Import data from JSON">
          Import
          <input type="file" id="import-file" accept=".json" onchange="importData(event)" style="display:none">
        </label>
        <button class="btn btn-sm" onclick="signOut()" title="Sign out">Sign out</button>
      </div>
    </div>
  </header>

  <main id="app" style="display:none"></main>

  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Firebase SDK (compat v9 CDN) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    // Cache buster — bump this number after any app.js change
    const _v = 3;
  </script>
  <script src="data/subclasses.js?v=2"></script>
  <script src="data/species_backgrounds.js?v=1"></script>
  <script src="data/feats_items.js?v=1"></script>
  <script src="data/tools_data.js?v=1"></script>
  <script src="data/weapons_data.js?v=1"></script>
  <script src="app.js?v=131"></script>
</body>
</html>
